<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Complaint - Traffic Complaint System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">🚦 Traffic Complaint System</div>
            <ul class="nav-links">
                <li><a href="user-dashboard.html">Dashboard</a></li>
                <li><a href="submit-complaint.html" class="active">Submit Complaint</a></li>
                <li><a href="my-complaints.html">My Complaints</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="index.html" class="logout">Logout</a></li>
            </ul>
        </div>
    </nav>

    <!-- Page Container -->
    <div class="page-container">
        <h1>Submit a Complaint</h1>

        <form class="complaint-form">
            <!-- Personal Information -->
            <fieldset>
                <legend>Your Information</legend>
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="Your full name" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone" placeholder="01XXXXXXXXX" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Your email" required>
                </div>
            </fieldset>

            <!-- Complaint Details -->
            <fieldset>
                <legend>Complaint Details</legend>
                <div class="form-row">
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="">-- Select Category --</option>
                            <option value="illegal-parking">Illegal Parking</option>
                            <option value="broken-signals">Broken Signals</option>
                            <option value="road-damage">Road Damage</option>
                            <option value="blockage">Road Blockage</option>
                            <option value="accident">Accident</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="priority">Priority</label>
                        <select id="priority" required>
                            <option value="">-- Select Priority --</option>
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                            <option value="urgent">Urgent</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="date">Date of Incident</label>
                    <input type="date" id="date" required>
                </div>
            </fieldset>

            <!-- Location -->
            <fieldset>
                <legend>Location</legend>
                <div class="form-group">
                    <label for="location">Road/Area Name</label>
                    <input type="text" id="location" placeholder="Where did this happen?" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="area">Area</label>
                        <input type="text" id="area" placeholder="Thana/Area" required>
                    </div>
                    <div class="form-group">
                        <label for="city">City</label>
                        <select id="city" required>
                            <option value="">-- Select City --</option>
                            <option value="dhaka">Dhaka</option>
                            <option value="chittagong">Chittagong</option>
                            <option value="khulna">Khulna</option>
                            <option value="rajshahi">Rajshahi</option>
                            <option value="sylhet">Sylhet</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <!-- Description -->
            <fieldset>
                <legend>Description</legend>
                <div class="form-group">
                    <label for="description">Describe the Issue</label>
                    <textarea id="description" rows="5" placeholder="Please describe the traffic issue in detail..." required></textarea>
                </div>
                <div class="form-group">
                    <label for="photo">Upload Photo (Optional)</label>
                    <input type="file" id="photo" accept="image/*">
                </div>
            </fieldset>

            <!-- Agreement -->
            <fieldset>
                <legend>Confirmation</legend>
                <div class="form-group checkbox">
                    <input type="checkbox" id="agree" required>
                    <label for="agree">I confirm this information is accurate</label>
                </div>
            </fieldset>

            <div class="form-buttons">
                <a href="user-dashboard.html" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Submit Complaint</button>
            </div>
        </form>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Traffic Complaint System. All rights reserved.</p>
    </footer>
</body>
</html>
