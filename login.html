<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Traffic Complaint System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h1>Login</h1>
            <p>Welcome back to Traffic Complaint System</p>

            <form class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <div class="form-group checkbox">
                    <input type="checkbox" id="remember">
                    <label for="remember">Remember me</label>
                </div>

                <a href="user-dashboard.html" class="btn btn-full">Login</a>
            </form>

            <p class="auth-link">Don't have an account? <a href="register.html">Create one here</a></p>
            <p class="auth-link"><a href="index.html">← Back to Home</a></p>
        </div>
    </div>
</body>
</html>
